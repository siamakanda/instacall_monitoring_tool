<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstacallMonitor Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; display: flex; gap: 4px; }
  nav a { color: #94a3b8; text-decoration: none; padding: 14px 18px; font-size: 14px; border-bottom: 2px solid transparent; }
  nav a:hover, nav a.active { color: #e2e8f0; border-bottom-color: #3b82f6; }
  .container { max-width: 800px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #f8fafc; }
  h2 { font-size: 16px; font-weight: 600; margin: 16px 0 10px; color: #cbd5e1; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
  .status-dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .status-dot.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; color: #94a3b8; }
  .stat-row span:last-child { color: #e2e8f0; }
  label { display: block; font-size: 13px; color: #94a3b8; margin: 10px 0 4px; }
  input, select { width: 100%; padding: 8px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #3b82f6; }
  input[type="checkbox"] { width: auto; margin-right: 8px; }
  button, .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; border: none; font-size: 14px; cursor: pointer; text-decoration: none; }
  .btn-start { background: #22c55e; color: #0f172a; font-weight: 600; }
  .btn-start:hover { background: #16a34a; }
  .btn-stop { background: #ef4444; color: #fff; font-weight: 600; }
  .btn-stop:hover { background: #dc2626; }
  .btn-save { background: #3b82f6; color: #fff; font-weight: 600; margin-top: 12px; }
  .btn-save:hover { background: #2563eb; }
  .btn-ghost { background: #334155; color: #cbd5e1; }
  .btn-ghost:hover { background: #475569; }
  .btn-danger { background: #991b1b; color: #fca5a5; font-size: 12px; padding: 4px 10px; }
  .error { background: #451a1a; border: 1px solid #991b1b; color: #fca5a5; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
  .message { background: #1a3a1a; border: 1px solid #166534; color: #86efac; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
  .hint { font-size: 11px; color: #64748b; margin-top: 2px; }
  .button-row { display: flex; gap: 10px; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #334155; }
  th { color: #94a3b8; font-weight: 500; font-size: 12px; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; background: #1e3a5f; color: #93c5fd; }
  .badge.active { background: #166534; color: #86efac; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav>
  <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.path == url_for('dashboard') }}">Dashboard</a>
  <a href="{{ url_for('admin_settings') }}" class="{{ 'active' if request.path == url_for('admin_settings') }}">Settings</a>
  <a href="{{ url_for('admin_profiles') }}" class="{{ 'active' if request.path == url_for('admin_profiles') }}">Profiles</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
