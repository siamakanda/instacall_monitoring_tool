{% extends "base.html" %}
{% block content %}
<h1>Settings</h1>

{% if errors %}
<div class="error">
  {% for e in errors %}<div>- {{ e }}</div>{% endfor %}
</div>
{% endif %}

<form method="post" action="{{ url_for('admin_settings') }}">
<div class="card">
  <h2>Customer &amp; Monitoring</h2>
  <label>Customer IDs <span class="hint">(comma-separated)</span></label>
  <input name="customer_ids" value="{{ settings.customer_ids | join(', ') }}">
  <label>Check interval (seconds)</label>
  <input name="check_interval_seconds" type="number" value="{{ settings.check_interval_seconds }}" min="1">
  <label>Request timeout (seconds)</label>
  <input name="request_timeout" type="number" value="{{ settings.request_timeout }}" min="1">
  <label>Alert cooldown (seconds)</label>
  <input name="alert_cooldown_seconds" type="number" value="{{ settings.alert_cooldown_seconds }}" min="0">
</div>

<div class="card">
  <h2>Balance Thresholds</h2>
  <div class="form-row">
    <div><label>Primary threshold</label><input name="balance_threshold" type="number" step="any" value="{{ settings.balance_threshold }}"></div>
    <div><label>Rearm / escalation <span class="hint">(must be &le; primary)</span></label><input name="balance_rearm_threshold" type="number" step="any" value="{{ settings.balance_rearm_threshold }}"></div>
  </div>
</div>

<div class="card">
  <h2>Margin Thresholds</h2>
  <div class="form-row">
    <div><label>Margin threshold (%)</label><input name="margin_threshold" type="number" step="any" value="{{ settings.margin_threshold }}"></div>
    <div><label>Margin rearm / escalation % <span class="hint">(must be &le; primary)</span></label><input name="margin_rearm_threshold" type="number" step="any" value="{{ settings.margin_rearm_threshold }}"></div>
  </div>
  <label>Billed min threshold</label>
  <input name="billed_min_threshold" type="number" step="any" value="{{ settings.billed_min_threshold }}">
</div>

<div class="card">
  <h2>Scheduling</h2>
  <div class="form-row">
    <div><label>Active hours start <span class="hint">(HH:MM, empty=24/7)</span></label><input name="active_hours_start" value="{{ settings.active_hours_start }}" placeholder="08:00"></div>
    <div><label>Active hours end</label><input name="active_hours_end" value="{{ settings.active_hours_end }}" placeholder="18:00"></div>
  </div>
  <label>Active days <span class="hint">(mon,tue,wed,thu,fri,sat,sun, empty=all)</span></label>
  <input name="active_days" value="{{ settings.active_days }}" placeholder="mon,tue,wed,thu,fri">
</div>

<div class="card">
  <h2>Summary Report</h2>
  <div class="form-row">
    <div><label>Direction</label><select name="summary_direction"><option value="outbound" {% if settings.summary_direction == 'outbound' %}selected{% endif %}>outbound</option><option value="inbound" {% if settings.summary_direction == 'inbound' %}selected{% endif %}>inbound</option></select></div>
    <div><label>Interval</label><input name="summary_interval" value="{{ settings.summary_interval }}" placeholder="5m"></div>
  </div>
  <label><input type="checkbox" name="summary_show_all" {% if settings.summary_show_all %}checked{% endif %}> Show all rows in console output</label>
</div>

<div class="card">
  <h2>Audio &amp; Siren</h2>
  <label><input type="checkbox" name="audio_enabled" {% if settings.audio_enabled %}checked{% endif %}> Audio alerts enabled</label>
  <div class="form-row">
    <div><label>Siren loops</label><input name="siren_loops" type="number" value="{{ settings.siren_loops }}" min="1"></div>
    <div><label>Min freq (Hz)</label><input name="siren_min_freq" type="number" value="{{ settings.siren_min_freq }}" min="100"></div>
    <div><label>Max freq (Hz)</label><input name="siren_max_freq" type="number" value="{{ settings.siren_max_freq }}" min="100"></div>
    <div><label>Step freq (Hz)</label><input name="siren_step_freq" type="number" value="{{ settings.siren_step_freq }}" min="1"></div>
    <div><label>Tone duration (ms)</label><input name="siren_tone_duration" type="number" value="{{ settings.siren_tone_duration }}" min="10"></div>
  </div>
</div>

<div class="card">
  <h2>Webhooks</h2>
  <div class="form-row">
    <div><label>Type</label><select name="webhook_type"><option value="none" {% if settings.webhook_type == 'none' %}selected{% endif %}>none</option><option value="telegram" {% if settings.webhook_type == 'telegram' %}selected{% endif %}>telegram</option><option value="slack" {% if settings.webhook_type == 'slack' %}selected{% endif %}>slack</option></select></div>
    <div><label>Telegram chat ID</label><input name="telegram_chat_id" value="{{ settings.telegram_chat_id }}"></div>
  </div>
  <label>Webhook URL</label>
  <input name="webhook_url" value="{{ settings.webhook_url }}">
</div>

<div class="card">
  <h2>Servers</h2>
  <div class="form-row">
    <div><label>Health port <span class="hint">(0=disabled)</span></label><input name="health_port" type="number" value="{{ settings.health_port }}" min="0"></div>
    <div><label>Web admin port <span class="hint">(0=disabled)</span></label><input name="webadmin_port" type="number" value="{{ settings.webadmin_port }}" min="0"></div>
  </div>
  <label><input type="checkbox" name="logging_json" {% if settings.logging_json %}checked{% endif %}> JSON logging</label>
  <label>DB retention (days, 0=keep all)</label>
  <input name="db_retention_days" type="number" value="{{ settings.db_retention_days }}" min="0">
</div>

<button class="btn btn-save" style="width:100%;">Save Settings</button>
</form>
{% endblock %}
